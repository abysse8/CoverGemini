# pytest configuration. `[pytest]` is the section pytest looks for.
[pytest]
# Where to hunt for tests. Keeps pytest from wandering into .venv or archive/.
testpaths = tests

# File / class / function name patterns that count as tests.
# We add *Tests because this repo names classes KindGatingTests, not TestKindGating.
# (pytest also auto-collects unittest.TestCase subclasses regardless, but being
#  explicit documents the house convention.)
python_files = test_*.py
python_classes = Test* *Tests
python_functions = test_*

# -v         : verbose, one line per test so you can see what ran.
# -ra        : at the end, summarize any skipped/xfailed tests and WHY.
#              This is how you "stay informed" about specs that aren't live yet.
addopts = -v -ra
